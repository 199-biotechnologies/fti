[experiment]
target_file = "eval_metric.py"
eval_command = "python3 eval_metric.py 2>/tmp/autoresearch_debug.txt"
metric = "ratio"
direction = "maximize"
time_budget = "300"

[metadata]
name = "C_u Neural Experiment Optimisation"
description = """
Optimise the neural experiment to maximise the I_eff separation between
the bottleneck agent and the wide memoriser. Higher ratio = the bottleneck
is more efficient at acquiring useful structure, which is the paper's key claim.

Quality gates: C_u(BN) > 0.8, C_u(Noise) < 0.1, A(BN) > 0.9.
These ensure we don't game the ratio by degrading the bottleneck.
"""
